name: Deploy HTML reports to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'AMC_Papers/reports/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy reports to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: AMC_Papers/reports
          force_orphan: true
